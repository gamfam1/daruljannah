<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latest Prayer Schedule</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&amp;family=Roboto:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
      /* width: 515px;
      height: 600px; */
    }

    /* Font Family */
    .roboto-condensed-font {
      font-family: "Roboto Condensed", sans-serif;
      font-optical-sizing: auto;
      font-weight: 100 900;
      font-style: normal;
    }

    body {
      font-family: "Roboto", sans-serif;
      color: #fff;
      margin: 0;
      padding: 0;
      width: 100%;
      /* Changed from fixed 515px to 100% to fill iframe */
      height: 100%;
      /* Ensure body takes full height */
      display: flex;
      align-items: stretch;
      justify-content: center;
      /* Latest Change */
      background-color: transparent;
      border-radius: 1rem;

    }

    .schedule-card {
      --times-panel-width: 225px;
      --time-column-width: 104px;
      --times-gap: 8px;
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      border-radius: 1rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      text-align: center;
      display: flex;
      flex-direction: column;
      /* border: 1px solid rgba(255, 255, 255, 0.08); */

      /* Ensure background properties are set here as defaults */
      background-size: cover !important;
      background-position: center center !important;
      background-repeat: no-repeat !important;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      align-self: stretch;
      margin-bottom: 10px;
    }

    .content-wrapper {
      flex: 1;
      overflow-y: auto;
      scrollbar-gutter: stable both-edges;
      min-height: 0;
      padding-bottom: 8px;
    }

    /* Custom scrollbar styling */
    .content-wrapper::-webkit-scrollbar {
      width: 6px;
    }

    .content-wrapper::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .content-wrapper::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 3px;
    }

    .content-wrapper::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .header h2 {
      margin: 16px 2px 0px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-align: center;
      font-style: normal;
      line-height: 130%;
    }

    .header p {
      margin: 4px 0 0;
      opacity: 0.8;
      color: white;
      text-align: center;
      font-size: 14px;
      font-style: normal;
      font-weight: 500;
      line-height: 150%;
    }

    .row {
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background-color: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px 6px 12px;
      margin: 6px 12px;
      min-height: 57px;
    }

    .row:last-of-type {
      border-bottom: none;
    }

    .left {
      text-align: left;
      flex: 1 1 auto;
      min-width: 0;
    }

    .left h3 {
      margin: 0;
      /* font-size: 20px; */
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      line-height: 143%;
      white-space: nowrap;
      line-height: 1.2;
      color: #FFF;
      font-style: normal;
      text-transform: capitalize;
    }

    .left p {
      color: rgba(243, 244, 246, 0.50);
      font-size: 12px;
      font-style: normal;
      font-weight: 400;
      line-height: 120%;
    }

    .divider {
      width: 1px;
      height: 42px;
      background: rgba(255, 255, 255, 0.3);
    }

    .offset-column-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
    }

    .right {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-end;
      flex: 0 0 auto;
      width: var(--times-panel-width);
      gap: var(--times-gap);
    }

    .adhan-column,
    .iqamah-column,
    .khutbah-column {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      min-width: 0;
      width: var(--time-column-width);
    }

    .time-column {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .time-value {
      color: #FFF;
      font-size: 28px;
      font-style: normal;
      font-weight: 400;
      line-height: 75%;
      /* letter-spacing: 0.2px; */
      /* margin-bottom: 6px; */
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .time-value .ampm {
      color: rgba(255, 255, 255, 0.50);
      text-align: center;
      font-size: 0.75rem;
      font-weight: 400 !important;
      font-style: normal;
      line-height: 87%;
      display: inline-block;
      writing-mode: vertical-rl;
      text-orientation: upright;
      opacity: 0.95;
      /* line-height: 1; */
      transform: none;
      margin: 0px 4px 0 0;
      white-space: nowrap;
    }

    .time-label {
      color: #F3F4F6;
      font-size: 0.75rem;
      font-style: normal;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 100%;
    }

    .offset-time-label {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 2px;
    }

    .offset-column {
      display: inline-flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 6px;
    }

    .offset-value {
      font-size: 28px;
      letter-spacing: 0.2px;
      line-height: 1;
      /* margin-bottom: 6px; */
      display: inline-flex;
      align-items: flex-start;
      color: white;
      font-weight: 400;
      line-height: 100%;
    }

    .offset-time-value {
      display: flex;
      flex-direction: row;
      justify-content: end;
    }

    .offset-unit {
      color: rgba(255, 255, 255, 0.50);
      display: block;
      font-size: 0.75rem;
      opacity: 0.95;
      line-height: 1;
      white-space: nowrap;
      text-align: left;
      font-size: 12px;
      font-weight: 400 !important;
      line-height: 87%;
    }

    .offset-text {
      display: block;
      color: #F3F4F6;
      font-size: 12px;
      font-weight: 400;
      text-align: left;
      line-height: 87%;
      text-transform: capitalize;
    }

    .right [data-column-type] .time-value,
    .right [data-column-type] .offset-value {
      font-weight: 400 !important;
    }

    .right [data-column-emphasis="secondary"] .time-value,
    .right [data-column-emphasis="secondary"] .offset-value {
      font-weight: 700 !important;
    }

    .footer {
      padding: 8px 32px 12px 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .footer a {
      text-decoration: none;
    }

    .footer p {
      margin: 0 8px 0 0;
      color: rgba(243, 244, 246, 0.50);
      text-align: center;
      font-size: 12px;
      font-style: normal;
      font-weight: 400;
      line-height: 150%;
    }

    .footer div {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer img {
      width: 64.75px;
      height: 14px;
      opacity: 0.9;
    }

    .no-salah-message {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: white;
      text-align: center;
      font-size: 14px;
      font-style: normal;
      font-weight: 400;
      line-height: 150%;
    }

    @media (max-width: 768px) {
      .schedule-card {
        --times-panel-width: 210px;
        --time-column-width: 97px;
      }

      .header {
        margin-bottom: 8px;
        padding: 0 10px;
      }

      .header h2 {
        margin: 16px 0 0;
        font-size: 22px;
      }

      .header p {
        font-size: 13px;
      }

      .row {
        margin: 6px 10px;
        padding: 6px 10px;
      }

      .left h3 {
        font-size: 1.125rem;
        white-space: normal;
      }

      .time-value,
      .offset-value {
        font-size: 26px;
      }

      .footer {
        padding: 8px 10px 12px;
      }
    }

    @media (max-width: 480px) {
      .schedule-card {
        --times-panel-width: 186px;
        --time-column-width: 86px;
        --times-gap: 6px;
      }

      .header {
        padding: 0 8px;
      }

      .header h2 {
        font-size: 20px;
      }

      .header p {
        font-size: 12px;
      }

      .row {
        margin: 5px 8px;
        padding: 6px 8px;
      }

      .left h3 {
        font-size: 1rem;
      }

      .left p,
      .time-label,
      .offset-unit,
      .offset-text,
      .footer p {
        font-size: 11px;
      }

      .time-value,
      .offset-value {
        font-size: 23px;
      }

      .time-value .ampm {
        font-size: 11px;
      }

      .divider {
        height: 36px;
      }

      .footer {
        padding: 8px 8px 12px;
      }
    }

    @media (max-width: 360px) {
      .schedule-card {
        --times-panel-width: 174px;
        --time-column-width: 81px;
        --times-gap: 5px;
      }

      .content-wrapper {
        padding-bottom: 6px;
      }

      .header {
        padding: 0 6px;
      }

      .header h2 {
        font-size: 18px;
      }

      .header p {
        font-size: 11px;
      }

      .row {
        margin: 4px 6px;
        padding: 6px;
      }

      .left h3 {
        font-size: 0.95rem;
      }

      .time-value,
      .offset-value {
        font-size: 21px;
      }

      .time-label,
      .offset-unit,
      .offset-text,
      .footer p {
        font-size: 10px;
      }

      .time-value .ampm {
        font-size: 10px;
      }

      .footer {
        padding: 8px 6px 12px;
      }

      .footer img {
        width: 60px;
        height: auto;
      }
    }
  </style>
</head>
